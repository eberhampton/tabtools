<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON Formatter & Validator — TabTools.dev</title>
  <meta name="description" content="Paste messy JSON, get it formatted, validated, and syntax-highlighted. Free, fast, no sign-up required.">
  <meta property="og:title" content="JSON Formatter & Validator — TabTools.dev">
  <meta property="og:description" content="Paste messy JSON, get it formatted and validated instantly. Free developer tool, no sign-up.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://tabtools.dev/tools/json-formatter/">
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    .formatter-wrap {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .tool-status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 14px;
      font-size: 11px;
      border-top: 1px solid var(--border-panel);
    }

    .status-msg {
      color: var(--text-secondary);
      transition: color 0.15s;
    }

    .status-msg.valid {
      color: var(--accent);
    }

    .status-msg.invalid {
      color: #f87171;
    }

    .status-meta {
      color: var(--text-muted);
    }

    .output-wrap {
      position: relative;
    }

    .output-pre {
      padding: 1rem 14px;
      min-height: 200px;
      max-height: 500px;
      overflow: auto;
      font-family: var(--font-mono);
      font-size: 13px;
      line-height: 1.7;
      color: var(--text-primary);
      white-space: pre;
      tab-size: 2;
    }

    .output-placeholder {
      color: var(--text-secondary);
      font-style: normal;
    }

    .output-pre .key { color: var(--json-key); }
    .output-pre .string { color: var(--json-string); }
    .output-pre .number { color: var(--json-value); }
    .output-pre .boolean { color: var(--json-value); }
    .output-pre .null { color: var(--text-muted); }
    .output-pre .bracket { color: var(--text-primary); }
    .output-pre .error { color: #f87171; }

    .copy-toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--accent);
      color: var(--bg-primary);
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      padding: 8px 20px;
      border-radius: var(--radius);
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 100;
    }

    .copy-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .tool-textarea {
      min-height: 180px;
      max-height: 400px;
      overflow: auto;
    }

    .input-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 0 8px 0;
    }

    .input-label {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 1px;
    }

    .input-hint {
      font-size: 11px;
      color: var(--text-muted);
    }

    .error-detail {
      padding: 10px 14px;
      font-size: 12px;
      color: #f87171;
      border-top: 1px solid var(--border-panel);
      line-height: 1.5;
    }

    @media (max-width: 640px) {
      .tool-actions {
        flex-wrap: wrap;
      }

      .btn {
        flex: 1;
        text-align: center;
        min-width: 70px;
      }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <a href="/" class="site-logo">
      <div class="logo-dot"></div>
      <div class="logo-text">
        <span class="logo-tab">tab</span><span class="logo-tools">tools</span><span class="logo-tld">.dev</span>
      </div>
    </a>
  <nav class="site-nav">
     <a href="/tools/json-formatter/">JSON</a>
     <a href="/tools/cron-builder/">CRON</a>
     <a href="/tools/webhook-tester/">WEBHOOK</a>
     <a href="/">ALL</a>
   <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">LIGHT</button>
  </nav>
</header>

  <main class="site-main">

    <div class="formatter-wrap">

      <div class="input-header">
        <span class="input-label">INPUT</span>
        <span class="input-hint">paste or type json</span>
      </div>

      <div class="tool-panel">
        <div class="tool-panel-header">
          <span class="tool-panel-title">json formatter</span>
          <div class="tool-panel-dots">
            <div class="tool-panel-dot"></div>
            <div class="tool-panel-dot"></div>
            <div class="tool-panel-dot active"></div>
          </div>
        </div>
        <div class="tool-panel-body">
          <textarea
            id="jsonInput"
            class="tool-textarea"
            placeholder="$ paste your json here..."
            spellcheck="false"
            autocomplete="off"
          ></textarea>
        </div>
      </div>

      <div class="tool-actions">
        <button class="btn btn-primary" id="btnFormat" onclick="formatJSON()">FORMAT</button>
        <button class="btn btn-secondary" id="btnMinify" onclick="minifyJSON()">MINIFY</button>
        <button class="btn btn-secondary" id="btnCopy" onclick="copyOutput()">COPY</button>
        <button class="btn btn-secondary" id="btnValidate" onclick="validateJSON()">VALIDATE</button>
        <button class="btn btn-secondary" id="btnClear" onclick="clearAll()" style="margin-left: auto;">CLEAR</button>
      </div>

      <div class="tool-panel output-wrap" id="outputPanel" style="display: none;">
        <div class="tool-panel-header">
          <span class="tool-panel-title">output</span>
          <div class="tool-panel-dots">
            <div class="tool-panel-dot"></div>
            <div class="tool-panel-dot"></div>
            <div class="tool-panel-dot active"></div>
          </div>
        </div>
        <div class="output-pre" id="jsonOutput">
          <span class="output-placeholder">formatted output appears here</span>
        </div>
        <div class="tool-status-bar">
          <span class="status-msg" id="statusMsg"></span>
          <span class="status-meta" id="statusMeta"></span>
        </div>
        <div class="error-detail" id="errorDetail" style="display: none;"></div>
      </div>

    </div>

  </main>

  <footer class="site-footer">
    <span>fast. clean. no clutter.</span>
    <span><a href="mailto:support@tabtools.dev">support@tabtools.dev</a> · <a href="https://ko-fi.com/bobrew">buy me a coffee</a></span>
  </footer>

  <div class="copy-toast" id="copyToast">COPIED</div>

  <script>
    const input = document.getElementById('jsonInput');
    const output = document.getElementById('jsonOutput');
    const outputPanel = document.getElementById('outputPanel');
    const statusMsg = document.getElementById('statusMsg');
    const statusMeta = document.getElementById('statusMeta');
    const errorDetail = document.getElementById('errorDetail');
    const copyToast = document.getElementById('copyToast');

    let lastFormatted = '';

    function showOutput() {
      outputPanel.style.display = 'block';
    }

    function setStatus(msg, type) {
      statusMsg.textContent = msg;
      statusMsg.className = 'status-msg';
      if (type) statusMsg.classList.add(type);
    }

    function setMeta(text) {
      statusMeta.textContent = text;
    }

    function showError(msg) {
      errorDetail.textContent = msg;
      errorDetail.style.display = 'block';
    }

    function hideError() {
      errorDetail.style.display = 'none';
      errorDetail.textContent = '';
    }

    function countProperties(obj) {
      let count = 0;
      if (Array.isArray(obj)) {
        count += obj.length;
        obj.forEach(function(item) {
          if (typeof item === 'object' && item !== null) {
            count += countProperties(item);
          }
        });
      } else if (typeof obj === 'object' && obj !== null) {
        const keys = Object.keys(obj);
        count += keys.length;
        keys.forEach(function(key) {
          if (typeof obj[key] === 'object' && obj[key] !== null) {
            count += countProperties(obj[key]);
          }
        });
      }
      return count;
    }

    function syntaxHighlight(json) {
      json = json
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');

      return json.replace(
        /("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
        function(match) {
          let cls = 'number';
          if (/^"/.test(match)) {
            if (/:$/.test(match)) {
              cls = 'key';
              match = match.replace(/:$/, '');
              return '<span class="' + cls + '">' + match + '</span>:';
            } else {
              cls = 'string';
            }
          } else if (/true|false/.test(match)) {
            cls = 'boolean';
          } else if (/null/.test(match)) {
            cls = 'null';
          }
          return '<span class="' + cls + '">' + match + '</span>';
        }
      );
    }

    function getByteSize(str) {
      const bytes = new Blob([str]).size;
      if (bytes < 1024) return bytes + ' B';
      return (bytes / 1024).toFixed(1) + ' KB';
    }

    function formatJSON() {
      const raw = input.value.trim();
      if (!raw) return;

      hideError();
      showOutput();

      try {
        const parsed = JSON.parse(raw);
        const formatted = JSON.stringify(parsed, null, 2);
        lastFormatted = formatted;
        output.innerHTML = syntaxHighlight(formatted);

        const props = countProperties(parsed);
        const depth = JSON.stringify(parsed).split('').reduce(function(max, ch) {
          if (ch === '{' || ch === '[') max.current++;
          if (ch === '}' || ch === ']') max.current--;
          if (max.current > max.max) max.max = max.current;
          return max;
        }, { current: 0, max: 0 }).max;

        setStatus('valid json', 'valid');
        setMeta(props + ' properties · depth ' + depth + ' · ' + getByteSize(raw));
      } catch (e) {
        lastFormatted = '';
        output.innerHTML = '<span class="error">' + escapeHtml(raw) + '</span>';
        setStatus('invalid json', 'invalid');
        setMeta('');
        showError(e.message);
      }
    }

    function minifyJSON() {
      const raw = input.value.trim();
      if (!raw) return;

      hideError();
      showOutput();

      try {
        const parsed = JSON.parse(raw);
        const minified = JSON.stringify(parsed);
        lastFormatted = minified;
        output.innerHTML = syntaxHighlight(minified);
        setStatus('minified', 'valid');
        setMeta(getByteSize(raw) + ' → ' + getByteSize(minified));
      } catch (e) {
        lastFormatted = '';
        output.innerHTML = '<span class="error">' + escapeHtml(raw) + '</span>';
        setStatus('invalid json', 'invalid');
        setMeta('');
        showError(e.message);
      }
    }

    function validateJSON() {
      const raw = input.value.trim();
      if (!raw) return;

      hideError();
      showOutput();

      try {
        const parsed = JSON.parse(raw);
        const props = countProperties(parsed);
        output.innerHTML = '<span class="output-placeholder">json is valid — use FORMAT to see it pretty-printed</span>';
        lastFormatted = '';
        setStatus('valid json', 'valid');
        setMeta(props + ' properties · ' + getByteSize(raw));
      } catch (e) {
        lastFormatted = '';
        output.innerHTML = '<span class="error">invalid json</span>';
        setStatus('invalid json', 'invalid');
        setMeta('');
        showError(e.message);
      }
    }

    function copyOutput() {
      if (!lastFormatted) return;

      navigator.clipboard.writeText(lastFormatted).then(function() {
        copyToast.classList.add('show');
        setTimeout(function() {
          copyToast.classList.remove('show');
        }, 1500);
      });
    }

    function clearAll() {
      input.value = '';
      output.innerHTML = '<span class="output-placeholder">formatted output appears here</span>';
      outputPanel.style.display = 'none';
      lastFormatted = '';
      hideError();
      setStatus('');
      setMeta('');
      input.focus();
    }

    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // Auto-format on paste
    input.addEventListener('paste', function() {
      setTimeout(formatJSON, 50);
    });

    // Ctrl/Cmd+Enter to format
    input.addEventListener('keydown', function(e) {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
        e.preventDefault();
        formatJSON();
      }
    });

    // Tab key inserts spaces instead of changing focus
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Tab') {
        e.preventDefault();
        const start = this.selectionStart;
        const end = this.selectionEnd;
        this.value = this.value.substring(0, start) + '  ' + this.value.substring(end);
        this.selectionStart = this.selectionEnd = start + 2;
      }
    });
</script>
<script>
function toggleTheme() {
  var current = document.documentElement.getAttribute('data-theme');
  var next = current === 'light' ? 'dark' : 'light';
  document.documentElement.setAttribute('data-theme', next === 'dark' ? '' : next);
  localStorage.setItem('tabtools-theme', next);
  document.getElementById('themeBtn').textContent = next === 'light' ? 'DARK' : 'LIGHT';
}
(function() {
  var saved = localStorage.getItem('tabtools-theme');
  if (saved === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    var btn = document.getElementById('themeBtn');
    if (btn) btn.textContent = 'DARK';
  }
})();
 </script>
