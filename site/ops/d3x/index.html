<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>ops — tabtools.dev</title>
    <style>
        /* ── tabtools.dev design system ── */
        :root {
            --bg-primary: #0d0d0d;
            --surface: #161616;
            --deep-surface: #0d0d0d;
            --border-panel: #252525;
            --border-subtle: #1a1a1a;
            --border-button: #333;
            --text-primary: #f5f5f5;
            --text-secondary: #c0c0c0;
            --text-muted: #a0a0a0;
            --text-faint: #808080;
            --accent: #6ee7b7;
            --amber: #f5a01f;
            --red: #ef4444;
            --indigo: #818cf8;
        }

        [data-theme="light"] {
            --bg-primary: #f5f5f0;
            --surface: #ffffff;
            --deep-surface: #f5f5f0;
            --border-panel: #d4d4d4;
            --border-subtle: #e5e5e0;
            --border-button: #c0c0c0;
            --text-primary: #1a1a1a;
            --text-secondary: #404040;
            --text-muted: #606060;
            --text-faint: #909090;
            --accent: #059669;
            --amber: #b45309;
            --red: #dc2626;
            --indigo: #6d28d9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Courier New', monospace;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.5;
        }

        /* ── Header ── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-panel);
        }

        .logo {
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .logo .tab { color: var(--text-primary); }
        .logo .tools { color: var(--accent); }
        .logo .ops { color: var(--text-faint); font-weight: normal; }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .theme-toggle {
            background: none;
            border: 1px solid var(--border-button);
            color: var(--text-muted);
            font-family: 'Courier New', monospace;
            font-size: 12px;
            padding: 4px 10px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .theme-toggle:hover { color: var(--text-primary); }

        .refresh-info {
            font-size: 11px;
            color: var(--text-faint);
        }

        /* ── Main ── */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 24px;
        }

        .page-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-faint);
            margin-bottom: 8px;
        }

        .collected-at {
            font-size: 12px;
            color: var(--text-faint);
            margin-bottom: 24px;
        }

        .collected-at span { color: var(--amber); }

        /* ── Grid ── */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 16px;
        }

        .grid-full {
            grid-column: 1 / -1;
        }

        @media (max-width: 700px) {
            .grid { grid-template-columns: 1fr; }
        }

        /* ── Card ── */
        .card {
            background: var(--surface);
            border: 1px solid var(--border-panel);
            border-radius: 3px;
            padding: 16px 20px;
        }

        .card-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-faint);
            margin-bottom: 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-subtle);
        }

        /* ── Status rows ── */
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            font-size: 13px;
        }

        .status-row + .status-row {
            border-top: 1px solid var(--border-subtle);
        }

        .status-label {
            color: var(--text-muted);
        }

        .status-value {
            color: var(--text-primary);
            text-align: right;
        }

        /* ── Indicators ── */
        .ok { color: var(--accent); }
        .warn { color: var(--amber); }
        .bad { color: var(--red); }

        .indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            display: inline-block;
        }

        .dot-ok { background: var(--accent); }
        .dot-warn { background: var(--amber); }
        .dot-bad { background: var(--red); }

        .dot-ok.pulse {
            animation: pulse-green 2s ease-in-out infinite;
        }

        @keyframes pulse-green {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* ── Bar ── */
        .bar-container {
            width: 100%;
            height: 6px;
            background: var(--border-panel);
            border-radius: 2px;
            margin-top: 6px;
        }

        .bar-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.4s ease;
        }

        /* ── Top pages table ── */
        .pages-table {
            width: 100%;
            font-size: 13px;
        }

        .pages-table-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
        }

        .pages-table-row + .pages-table-row {
            border-top: 1px solid var(--border-subtle);
        }

        .pages-path {
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
            margin-right: 16px;
        }

        .pages-count {
            color: var(--accent);
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }

        /* ── Banned IPs ── */
        .banned-list {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
            word-break: break-all;
        }

        /* ── Loading / Error ── */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-faint);
            font-size: 14px;
        }

        .error-msg {
            text-align: center;
            padding: 60px 20px;
            color: var(--red);
            font-size: 14px;
        }

        /* ── Footer ── */
        .footer {
            padding: 16px 24px;
            text-align: center;
            font-size: 11px;
            color: var(--text-faint);
            border-top: 1px solid var(--border-subtle);
            margin-top: 32px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">
            <span class="tab">tab</span><span class="tools">tools</span>
            <span class="ops"> /ops</span>
        </div>
        <div class="header-right">
            <span class="refresh-info" id="refresh-info"></span>
            <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">light</button>
        </div>
    </div>

    <div class="container">
        <div class="page-title">system status</div>
        <div class="collected-at" id="collected-at">loading...</div>

        <div id="dashboard-content">
            <div class="loading">collecting status data...</div>
        </div>
    </div>

    <div class="footer">
        unlisted · auto-refreshes every 5 minutes
    </div>

    <script>
        // ── Theme ──
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            localStorage.setItem('tabtools-theme', next);
            document.getElementById('theme-toggle').textContent = next === 'dark' ? 'light' : 'dark';
        }

        (function initTheme() {
            const saved = localStorage.getItem('tabtools-theme');
            if (saved) {
                document.documentElement.setAttribute('data-theme', saved);
                document.getElementById('theme-toggle').textContent = saved === 'dark' ? 'light' : 'dark';
            }
        })();

        // ── Helpers ──
        function ok(text) { return `<span class="ok">${text}</span>`; }
        function warn(text) { return `<span class="warn">${text}</span>`; }
        function bad(text) { return `<span class="bad">${text}</span>`; }

        function dot(type, pulsing) {
            const cls = pulsing ? `dot dot-${type} pulse` : `dot dot-${type}`;
            return `<span class="${cls}"></span>`;
        }

        function indicator(type, text, pulsing = false) {
            return `<span class="indicator">${dot(type, pulsing)} ${text}</span>`;
        }

        function serviceStatus(val) {
            if (val === 'active' || val === 'listening') return indicator('ok', ok(val), true);
            if (val === 'inactive') return indicator('bad', bad(val));
            return indicator('warn', warn(val));
        }

        function barColor(pct) {
            if (pct < 60) return 'var(--accent)';
            if (pct < 80) return 'var(--amber)';
            return 'var(--red)';
        }

        function bar(pct) {
            return `<div class="bar-container"><div class="bar-fill" style="width:${pct}%;background:${barColor(pct)}"></div></div>`;
        }

        function row(label, value) {
            return `<div class="status-row"><span class="status-label">${label}</span><span class="status-value">${value}</span></div>`;
        }

        // ── Render ──
        function render(d) {
            const s = d.security;
            const sys = d.system;
            const svc = d.services;
            const ssl = d.ssl;
            const bk = d.backups;
            const tr = d.traffic;

            // SSL status
            let sslStatus;
            if (ssl.days_left > 30) sslStatus = indicator('ok', ok(`${ssl.days_left} days left`));
            else if (ssl.days_left > 7) sslStatus = indicator('warn', warn(`${ssl.days_left} days left`));
            else if (ssl.days_left > 0) sslStatus = indicator('bad', bad(`${ssl.days_left} days left!`));
            else sslStatus = indicator('bad', bad('unknown'));

            // SSH checks
            const sshPw = s.ssh.password_auth === 'no'
                ? indicator('ok', ok('disabled'))
                : indicator('bad', bad('ENABLED'));
            const sshRoot = s.ssh.root_login === 'no'
                ? indicator('ok', ok('disabled'))
                : indicator('bad', bad('ENABLED'));

            // Unattended
            const uaStatus = s.unattended_upgrades === 'active'
                ? indicator('ok', ok('active'))
                : indicator('warn', warn(s.unattended_upgrades));

            // Nginx hardening
            const tokensOff = s.nginx_hardening.server_tokens_off
                ? indicator('ok', ok('yes')) : indicator('bad', bad('no'));
            const hiddenBlocked = s.nginx_hardening.hidden_files_blocked
                ? indicator('ok', ok('yes')) : indicator('bad', bad('no'));

            // Fail2ban
            const f2bStatus = s.fail2ban.running
                ? indicator('ok', ok('active'), true)
                : indicator('bad', bad('down'));

            // Memory bar color class
            const memPct = sys.memory.percent;
            const diskPct = sys.disk.percent;

            // Top pages
            let pagesHtml = '';
            if (tr.top_pages && tr.top_pages.length > 0) {
                pagesHtml = tr.top_pages.map(p =>
                    `<div class="pages-table-row">
                        <span class="pages-path">${p.path}</span>
                        <span class="pages-count">${p.count}</span>
                    </div>`
                ).join('');
            } else {
                pagesHtml = `<div style="color:var(--text-faint);font-size:13px;">no data yet</div>`;
            }

            // Banned IPs
            let bannedHtml = '';
            if (s.fail2ban.banned_ips && s.fail2ban.banned_ips.trim()) {
                bannedHtml = `<div class="banned-list">banned: ${s.fail2ban.banned_ips}</div>`;
            }

            const html = `
                <div class="grid">
                    <!-- Services -->
                    <div class="card">
                        <div class="card-title">services</div>
                        ${row('nginx', serviceStatus(svc.nginx))}
                        ${row('webhook (systemd)', serviceStatus(svc.webhook))}
                        ${row('node :3100', serviceStatus(svc.node_port_3100))}
                        ${row('ssl certificate', sslStatus)}
                    </div>

                    <!-- System -->
                    <div class="card">
                        <div class="card-title">system</div>
                        ${row('uptime', `<span class="ok">${sys.uptime}</span>`)}
                        ${row('load (1/5/15)', sys.load.join(' / '))}
                        ${row('memory', `${sys.memory.used_mb}/${sys.memory.total_mb} MB (${memPct}%)`)}
                        ${bar(memPct)}
                        <div style="height:8px"></div>
                        ${row('disk', `${sys.disk.used}/${sys.disk.total} (${diskPct}%)`)}
                        ${bar(diskPct)}
                    </div>

                    <!-- Security -->
                    <div class="card">
                        <div class="card-title">security</div>
                        ${row('ufw firewall', s.ufw.status === 'active' ? indicator('ok', ok('active'), true) : indicator('bad', bad(s.ufw.status)))}
                        ${row('open ports', s.ufw.open_ports || 'none')}
                        ${row('password auth', sshPw)}
                        ${row('root login', sshRoot)}
                        ${row('unattended upgrades', uaStatus)}
                        ${row('server_tokens off', tokensOff)}
                        ${row('hidden files blocked', hiddenBlocked)}
                    </div>

                    <!-- Fail2ban -->
                    <div class="card">
                        <div class="card-title">fail2ban · sshd</div>
                        ${row('status', f2bStatus)}
                        ${row('currently banned', s.fail2ban.current_banned > 0
                            ? `<span class="warn">${s.fail2ban.current_banned}</span>`
                            : ok('0')
                        )}
                        ${row('total banned (all time)', String(s.fail2ban.total_banned))}
                        ${row('auth failures (24h)', s.auth_failures_24h > 10
                            ? `<span class="warn">${s.auth_failures_24h}</span>`
                            : String(s.auth_failures_24h)
                        )}
                        ${bannedHtml}
                    </div>

                    <!-- Traffic -->
                    <div class="card">
                        <div class="card-title">traffic · goatcounter</div>
                        ${row('today views', `<span class="ok">${tr.today.views}</span>`)}
                        ${row('today visitors', String(tr.today.visitors))}
                        ${row('7-day views', `<span class="ok">${tr.week.views}</span>`)}
                        ${row('7-day visitors', String(tr.week.visitors))}
                    </div>

                    <!-- Backups -->
                    <div class="card">
                        <div class="card-title">maintenance</div>
                        ${row('last backup', bk.last_backup)}
                        ${row('last healthcheck', bk.last_healthcheck)}
                    </div>

                    <!-- Top Pages -->
                    <div class="card grid-full">
                        <div class="card-title">top pages · last 7 days</div>
                        <div class="pages-table">${pagesHtml}</div>
                    </div>
                </div>
            `;

            document.getElementById('dashboard-content').innerHTML = html;
        }

        // ── Fetch ──
        let lastFetch = null;

        async function fetchStatus() {
            try {
                const resp = await fetch('data.json?t=' + Date.now());
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const data = await resp.json();

                document.getElementById('collected-at').innerHTML =
                    `last collected: <span>${data.local_time}</span>`;

                render(data);
                lastFetch = new Date();
                document.getElementById('refresh-info').textContent =
                    'updated ' + lastFetch.toLocaleTimeString();
            } catch (err) {
                document.getElementById('dashboard-content').innerHTML =
                    `<div class="error-msg">
                        failed to load status data<br>
                        <span style="font-size:12px;color:var(--text-faint)">${err.message}</span><br>
                        <span style="font-size:12px;color:var(--text-faint)">has status-collector.sh run yet?</span>
                    </div>`;
            }
        }

        // Initial load + refresh every 5 min
        fetchStatus();
        setInterval(fetchStatus, 5 * 60 * 1000);
    </script>
</body>
</html>
